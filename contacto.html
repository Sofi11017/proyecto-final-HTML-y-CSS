<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto | Eco.Green</title>
<link rel="icon" type="image/png" href="img/logo.png">
<link rel="stylesheet" href="css/contacto.css">

</head>
<body>

<header>

    <div class="logo">
        <img src="img/logo.png" alt="Eco.Green" class="logo-img">
        <span>Eco.Green</span>
    </div>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="catalogo.html">catalogo</a>
        <a href="nosotros.html">Nosotros</a>
        <a href="contacto.html">Contacto</a>
    </nav>

</header>

<section class="hero">
    <h1>Contáctanos</h1>
</section>

<section class="contacto">

    <div class="contacto-container">

        <div class="formulario">

            <h2>Envíanos un mensaje</h2>

            <form>

                <div class="campo">
                    <label>Nombre</label>
                    <input type="text" required minlength="3">
                </div>

                <div class="campo">
                    <label>Correo Electrónico</label>
                    <input type="email" required>
                </div>

                <div class="campo">
                    <label>Mensaje</label>
                    <textarea required minlength="10"></textarea>
                </div>

                <button class="btn" type="submit">
                    Enviar Mensaje
                </button>

            </form>

        </div>

        <div class="info">

            <div class="mejor-mundo">

                <img src="https://i0.wp.com/soclalluna.com/wp-content/uploads/2022/09/la-biodiversidad-y-el-cuidado-de-nuestro-planeta-es-fundamental-para-la-supervivencia_621784b7_1280x851.jpeg?ssl=1"
                alt="Mapa ubicación">

            </div>

            <div class="datos">

                <h3>Información de Contacto</h3>

                <p>📞 +57 312 345 6789</p>
                <p>✉ contacto@ecogreen.com</p>

                <div class="redes">

                    <a href="https://www.facebook.com/?locale=es_LA" class="red">F</a>
                    <a href="https://www.instagram.com/?hl=es" class="red">I</a>
                    <a href="https://x.com/?lang=es" class="red">X</a>

                </div>

            </div>

        </div>

    </div>

</section>

<footer>
    © 2026 Eco.Green - Todos los derechos reservados
</footer>

</body>
